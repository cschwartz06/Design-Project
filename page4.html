<style>
    body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    margin-top:50px;
    }
    
    .gallery{
    position:relative;
    width:500px;
    height:300px;
    overflow:hidden;
    border-radius:10px;
    }
    
    .gallery img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:none;
    }
    
    .gallery img.active{
    display:block;
    }
    
    button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(0,0,0,0.5);
    color:white;
    border:none;
    padding:10px 15px;
    cursor:pointer;
    font-size:20px;
    }
    
    .prev{
    left:10px;
    }
    
    .next{
    right:10px;
    }
    </style>
    </head>
    
    <body>
    
    <div class="gallery">
    <img src="ha.jpg" class="active">
    <img src="ok.jpg">
    <img src="okk.jpg">
    <img src="cookies.jpg">
    <img src="hah.jpg">
    <img src="haha.jpg">
    <img src="hahah.jpg">
   
    
    <button class="prev" onclick="changeSlide(-1)">❮</button>
    <button class="next" onclick="changeSlide(1)">❯</button>
    </div>
    
    <script>
    let current = 0;
    const slides = document.querySelectorAll(".gallery img");
    
    function changeSlide(direction){
    
    slides[current].classList.remove("active");
    
    current += direction;
    
    if(current < 0){
    current = slides.length - 1;
    }
    
    if(current >= slides.length){
    current = 0;
    }
    
    slides[current].classList.add("active");
    }
    </script>
